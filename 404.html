<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Página não encontrada</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      background: #141519;

      color: white;

      font-family: 'Poppins', sans-serif;

      text-align: center;
    }

    h1 {
      font-size: 120px;
      margin: 0;

      color: #f47521;

      animation: pulse 2s infinite;
    }

    h2 {
      margin-top: -20px;
      font-size: 30px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    a {
      text-decoration: none;

      background: #f47521;

      color: white;

      padding: 12px 25px;

      border-radius: 10px;

      transition: 0.3s;
    }

    a:hover {
      transform: scale(1.05);

      background: #ff8c42;
    }

    @keyframes pulse {

      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }

    }

  </style>

</head>

<body>

  <h1>404</h1>

  <h2>Página não encontrada</h2>

  <p>O mangá que você procura não existe ou foi removido.</p>

  <a href="index.html">Voltar para o início</a>

</body>

</html>
