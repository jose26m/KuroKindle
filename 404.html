<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 - Página não encontrada</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      background: linear-gradient(to bottom, #141519, #0d0e11);

      font-family: 'Poppins', sans-serif;

      overflow: hidden;

      color: white;

      text-align: center;
    }


    /*body::before {

      content: "";

      position: absolute;

      width: 600px;
      height: 600px;

      background: rgba(0,191,255,0.5);

      border-radius: 50%;

      filter: blur(120px);

      animation: glow 5s infinite alternate;
    }*/

    @keyframes glow {

      from {
        transform: translateY(-30px);
      }

      to {
        transform: translateY(30px);
      }

    }


    .personagem {

      width: 260px;

      margin-bottom: 20px;

      animation: flutuar 3s ease-in-out infinite;

      z-index: 2;
    }

    @keyframes flutuar {

      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }

      100% {
        transform: translateY(0);
      }

    }



    h1 {

      font-size: 120px;

      color: #00BFFF;

      text-shadow: 0 0 20px rgba(0,191,255,0.5);

      z-index: 2;
    }

    h2 {

      font-size: 32px;

      margin-bottom: 10px;

      z-index: 2;
    }

    p {

      color: #bdbdbd;

      max-width: 500px;

      margin-bottom: 30px;

      z-index: 2;
    }


    a {

      background: #00BFFF;

      color: white;

      text-decoration: none;

      padding: 14px 28px;

      border-radius: 12px;

      font-weight: bold;

      transition: 0.3s;

      z-index: 2;
    }

    a:hover {

      transform: scale(1.05);

      background: #00BFFF;

      box-shadow: 0 0 20px rgba(244,117,33,0.5);
    }


    @media (max-width: 600px) {

      h1 {
        font-size: 80px;
      }

      h2 {
        font-size: 24px;
      }

      .personagem {
        width: 180px;
      }

    }

  </style>

</head>

<body>

  <!--<img src="404-anime.png" alt="Personagem triste" class="personagem">-->

  <h1>404</h1>

  <h2>Página não encontrada</h2>

  <p>
    Parece que esse mangá desapareceu em outro universo...
  </p>

  <a href="index.html">
    Voltar para o início
  </a>

</body>

</html>
